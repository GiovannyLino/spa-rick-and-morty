<div class="login-container">
  <div class="login-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Rick_and_Morty.svg/800px-Rick_and_Morty.svg.png?20220319060844" alt="Rick and Morty Logo" class="login-logo">
    <h2>Bem-vindo!</h2>
    <p>Faça login para continuar.</p>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder="user@test.com">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required placeholder="password123">
      </div>
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
      <button type="submit" class="login-button" [disabled]="!email || !password">Entrar</button>
    </form>
  </div>
</div>
